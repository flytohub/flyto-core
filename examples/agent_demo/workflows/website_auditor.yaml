id: website-auditor
name: AI Website Auditor (PageSpeed)
version: 2.0.0
description: >
  Give it any URL — the AI agent runs it through Google PageSpeed Insights,
  reads the real Lighthouse scores, screenshots the results,
  then generates a professional audit report as a Markdown file.

steps:
  - id: launch
    module: browser.launch
    label: Launch Browser
    params:
      headless: false
      browser_type: chromium
      stealth: true
      locale: en-US
      width: 1280
      height: 900
      behavior: fast
    positionX: 80
    positionY: 200
    orderIndex: 0

  - id: auditor
    module: llm.agent
    label: "🔍 PageSpeed Auditor"
    params:
      max_iterations: 20
      max_input_size: 12000
      tools:
        - browser.goto
        - browser.snapshot
        - browser.scroll
        - browser.extract
        - browser.screenshot
        - browser.evaluate
        - browser.viewport
        - browser.click
        - browser.wait
      prompt_source: manual
      task: |
        You are a web performance auditor. Audit this website using Google PageSpeed Insights: https://flyto2.com

        Follow these steps IN ORDER:

        STEP 1 — Go to PageSpeed Insights
        - browser.goto: https://pagespeed.web.dev/
        - browser.snapshot: format=text (verify the page loaded)
        - browser.screenshot: path="pagespeed_home.png"

        STEP 2 — Enter the URL and analyze
        - browser.evaluate: run this to fill the input and submit:
          const input = document.querySelector('input[type="url"], input[name="url"], .url-input input, input');
          if (input) { input.value = 'https://flyto2.com'; input.dispatchEvent(new Event('input', {bubbles:true})); }
          return input ? 'filled' : 'no input found';
        - browser.click: click the "Analyze" button (use text method with target "Analyze")
        - browser.wait: duration_ms=15000 (wait for analysis to complete)

        STEP 3 — Read the results
        - browser.scroll: direction=down, amount=300
        - browser.screenshot: path="pagespeed_scores.png"
        - browser.snapshot: format=text (read all the scores and metrics)
        - browser.scroll: direction=down, amount=800
        - browser.snapshot: format=text (read more details: opportunities, diagnostics)
        - browser.screenshot: path="pagespeed_details.png"

        STEP 4 — Check mobile tab too (if available)
        - Look for a "Mobile" tab or toggle and click it if present
        - browser.snapshot: format=text (read mobile scores)
        - browser.screenshot: path="pagespeed_mobile.png"

        Now write a COMPLETE Markdown audit report. Include ALL data you collected.
        Return the report as plain text in Markdown format:

        # Website Audit Report: flyto2.com
        **Generated by Flyto AI Auditor** | Date: [today]

        ## Overall Scores
        | Category | Score |
        |----------|-------|
        | Performance | [X/100] |
        | Accessibility | [X/100] |
        | Best Practices | [X/100] |
        | SEO | [X/100] |

        ## Performance Metrics
        | Metric | Value | Rating |
        |--------|-------|--------|
        | First Contentful Paint | [Xs] | [good/needs work/poor] |
        | Largest Contentful Paint | [Xs] | [good/needs work/poor] |
        | Total Blocking Time | [Xms] | [good/needs work/poor] |
        | Cumulative Layout Shift | [X] | [good/needs work/poor] |
        | Speed Index | [Xs] | [good/needs work/poor] |

        ## Top Opportunities
        [List the top opportunities PageSpeed suggests, with estimated savings]

        ## Diagnostics
        [List key diagnostic items]

        ## Recommendations
        1. [Most important fix with specific instructions]
        2. [Second fix]
        3. [Third fix]

        ## What's Done Well
        - [Positive finding]
        - [Another positive]

        ---
        *Audited by Flyto AI Website Auditor using Google PageSpeed Insights*
      system_prompt: |
        You are a professional web performance consultant.
        RULES:
        - Use the browser tools to interact with PageSpeed Insights and read REAL scores
        - Never guess scores — only report what you see on the PageSpeed results page
        - If PageSpeed hasn't finished loading, wait and check again
        - Be specific in recommendations — reference actual metrics
        - Return the report in clean Markdown format
    positionX: 420
    positionY: 200
    orderIndex: 1
    resources:
      model: model_node
      memory: memory_node

  - id: display
    module: output.display
    label: "📊 Audit Report"
    params:
      content: "${auditor.data.result}"
      format: text
    positionX: 760
    positionY: 200
    orderIndex: 2

  - id: model_node
    module: ai.model
    label: GPT-4o
    params:
      provider: openai
      model: gpt-4o
      temperature: 0
      max_tokens: 4096
    positionX: 340
    positionY: 420
    orderIndex: 3

  - id: memory_node
    module: ai.memory
    label: Auditor Memory
    params:
      memory_type: buffer
      window_size: 20
      initial_messages: []
    positionX: 540
    positionY: 420
    orderIndex: 4

edges:
  - id: e1
    source: launch
    target: auditor
    sourceHandle: output
    targetHandle: target
    type: glow
    data: { edgeType: sequential, pathType: bezier }
  - id: e2
    source: auditor
    target: display
    sourceHandle: output
    targetHandle: target
    type: glow
    data: { edgeType: sequential, pathType: bezier }
  - id: r1
    source: model_node
    target: auditor
    sourceHandle: target
    targetHandle: target-model
    type: glow
    data: { edgeType: resource, pathType: bezier }
  - id: r2
    source: memory_node
    target: auditor
    sourceHandle: target
    targetHandle: target-memory
    type: glow
    data: { edgeType: resource, pathType: bezier }
