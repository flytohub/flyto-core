name: Login Test
description: "E2E login test: navigate to login page, fill credentials, submit, verify success, screenshot"

args:
  url:
    type: string
    required: true
    description: Login page URL
  username:
    type: string
    required: true
    description: Username or email
  password:
    type: string
    required: true
    description: Password
  success_selector:
    type: string
    required: true
    description: CSS selector that appears after successful login (e.g. .dashboard, .user-menu)
  output:
    type: string
    default: login-result.png
    description: Screenshot output path

steps:
  - id: launch
    module: browser.launch
    params:
      headless: true

  - id: navigate
    module: browser.goto
    params:
      url: "{{url}}"

  - id: login
    module: browser.login
    params:
      username: "{{username}}"
      password: "{{password}}"
      success_selector: "{{success_selector}}"

  - id: screenshot
    module: browser.screenshot
    params:
      path: "{{output}}"
      full_page: true

  - id: close
    module: browser.close
