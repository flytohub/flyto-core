id: security_audit_v3
name: Domain Security Audit
version: 3.0.0
steps:
  - id: start
    module: flow.start
    label: Start
    params: {}
    positionX: 60
    positionY: 250
    orderIndex: 0

  - id: launch
    module: browser.launch
    label: Launch Browser
    params:
      stealth: true
      browser_type: chromium
      behavior: fast
      width: 1280
      headless: false
      height: 900
      locale: en-US
    positionX: 180
    positionY: 250
    orderIndex: 1

  - id: api_scan
    module: browser.evaluate
    label: API Data Collection
    params:
      script: |
        (async function() {
          const domain = '[[domain]]';
          const depth = '[[scan_depth]]';
          const r = {};
          r.scan_date = new Date().toISOString().split('T')[0];
          r.scan_timestamp = new Date().toISOString();
          try { const d = await fetch('https://dns.google/resolve?name='+domain+'&type=A',{headers:{'Accept':'application/dns-json'}}); r.dns = await d.json(); } catch(e) { r.dns = {error: e.message}; }
          try { const ip = r.dns.Answer?.[0]?.data; if(ip){const s=await fetch('https://internetdb.shodan.io/'+ip); r.shodan=await s.json(); r.ip=ip;} } catch(e) { r.shodan = {error: e.message}; }
          try { const c=await fetch('https://crt.sh/?q=%25.'+domain+'&output=json'); const cd=await c.json(); const u=[...new Set(cd.map(e=>e.common_name||e.name_value).filter(Boolean))].sort(); r.subdomains={total:cd.length,unique:u.length,list:u.slice(0,50),notable:u.filter(s=>/^(api|admin|staging|dev|test|internal|vpn|mail|ftp|db|ssh|jenkins|gitlab|grafana|monitor|backup|proxy|cdn)/i.test(s.split('.')[0]))}; } catch(e) { r.subdomains = {error: e.message}; }
          try { const resp=await fetch('https://'+domain,{method:'GET',redirect:'follow'}); const h={}; resp.headers.forEach((v,k)=>{h[k]=v;}); r.http={status:resp.status,redirected:resp.redirected,final_url:resp.url,headers:h}; } catch(e) { r.http = {error: e.message}; }
          for(const[key,type,name]of[['mx','MX',domain],['txt','TXT',domain],['dmarc','TXT','_dmarc.'+domain],['ns','NS',domain]]){try{const d=await fetch('https://dns.google/resolve?name='+name+'&type='+type,{headers:{'Accept':'application/dns-json'}});r[key]=await d.json();}catch(e){r[key]={error:e.message};}}
          try{const tld=domain.split('.').pop();const url=tld==='com'||tld==='net'?'https://rdap.verisign.com/'+tld+'/v1/domain/'+domain:'https://rdap.org/domain/'+domain;const w=await fetch(url);if(w.ok){const wd=await w.json();const ev={};(wd.events||[]).forEach(e=>{ev[e.eventAction]=e.eventDate;});r.whois={registration:ev.registration||null,expiration:ev.expiration||null};}}catch(e){r.whois={error:e.message};}
          try{const ds=await fetch('https://dns.google/resolve?name='+domain+'&type=A&do=true',{headers:{'Accept':'application/dns-json'}});r.dnssec={authenticated:(await ds.json()).AD===true};}catch(e){r.dnssec={error:e.message};}
          if(depth==='deep'){
            for(const[key,type]of[['caa','CAA'],['aaaa','AAAA']]){try{const d=await fetch('https://dns.google/resolve?name='+domain+'&type='+type,{headers:{'Accept':'application/dns-json'}});r[key]=await d.json();}catch(e){r[key]={error:e.message};}}
            const paths=['/robots.txt','/.env','/.git/config','/.git/HEAD','/wp-login.php','/admin','/api','/.well-known/security.txt','/sitemap.xml','/swagger','/graphql','/actuator','/server-status','/phpinfo.php','/.DS_Store'];
            r.paths={};for(const p of paths){try{const x=await fetch('https://'+domain+p,{method:'HEAD',redirect:'manual'});r.paths[p]={status:x.status,exists:x.status<400};}catch(e){r.paths[p]={status:0,exists:false};}}
          }
          return JSON.stringify(r, null, 2);
        })()
      _tvars:
        domain: '{{domain}}'
        scan_depth: '{{scan_depth}}'
    positionX: 310
    positionY: 150
    orderIndex: 2

  - id: goto_site
    module: browser.goto
    label: Visit Target Site
    params:
      url: 'https://{{domain}}'
      wait_until: domcontentloaded
      timeout: 15000
    positionX: 440
    positionY: 150
    orderIndex: 3
    on_error: continue

  - id: client_scan
    module: browser.evaluate
    label: Client-Side Scan
    params:
      script: |
        (function() {
          const r = {meta_tags:{}, cookies:{}, third_party:{}, js_libs:{}, forms:{}, mixed_content:{}, info_disclosure:{}, js_patterns:{}, clickjacking:{}};
          document.querySelectorAll('meta[http-equiv]').forEach(m=>{r.meta_tags[m.getAttribute('http-equiv').toLowerCase()]=m.getAttribute('content');});
          const ref=document.querySelector('meta[name="referrer"]');if(ref)r.meta_tags['referrer-policy']=ref.getAttribute('content');
          const csp=r.meta_tags['content-security-policy']||'';r.meta_tags['has-frame-ancestors']=csp.includes('frame-ancestors');
          const gen=document.querySelector('meta[name="generator"]');if(gen)r.meta_tags['generator']=gen.getAttribute('content');
          const cookies=document.cookie.split(';').filter(c=>c.trim());r.cookies={count:cookies.length,names:cookies.map(c=>c.trim().split('=')[0])};
          const host=location.hostname;const isExt=h=>h&&h!==host&&!h.endsWith('.'+host);
          r.third_party.scripts=[...document.querySelectorAll('script[src]')].map(s=>{try{return new URL(s.src).hostname;}catch(e){return null;}}).filter(isExt);
          r.third_party.unique_domains=[...new Set(r.third_party.scripts)];
          r.third_party.iframes=[...document.querySelectorAll('iframe[src]')].map(f=>{try{return new URL(f.src).hostname;}catch(e){return null;}}).filter(Boolean);
          r.js_libs.jquery=typeof jQuery!=='undefined'?jQuery.fn.jquery:null;
          r.js_libs.vue=typeof Vue!=='undefined'?(Vue.version||true):null;
          r.js_libs.react=typeof React!=='undefined'?(React.version||true):null;
          r.js_libs.angular=(function(){try{return document.querySelector('[ng-version]')?.getAttribute('ng-version')||null;}catch(e){return null;}})();
          r.js_libs.lodash=typeof _!=='undefined'&&_.VERSION?_.VERSION:null;
          r.js_libs.bootstrap=(function(){try{return bootstrap?.Alert?.VERSION||null;}catch(e){return null;}})();
          r.js_libs.moment=typeof moment!=='undefined'?moment.version:null;
          const forms=[...document.querySelectorAll('form')];r.forms={count:forms.length,insecure_actions:forms.filter(f=>f.action&&f.action.startsWith('http://')).length,has_password:forms.some(f=>f.querySelector('input[type="password"]'))};
          r.mixed_content={http_images:document.querySelectorAll('img[src^="http://"]').length,http_scripts:document.querySelectorAll('script[src^="http://"]').length};r.mixed_content.has_mixed=r.mixed_content.http_images>0||r.mixed_content.http_scripts>0;
          const scripts=[...document.querySelectorAll('script:not([src])')];
          r.info_disclosure={html_comments:(document.documentElement.innerHTML.match(/<!--[\s\S]*?-->/g)||[]).length,hidden_inputs:[...document.querySelectorAll('input[type="hidden"]')].map(i=>i.name).filter(Boolean),inline_script_count:scripts.length};
          r.js_patterns={findings:[],total_inline:scripts.length};
          var checks=[{name:'eval()',test:function(c){return c.includes('eval(')},risk:'HIGH'},{name:'innerHTML=',test:function(c){return c.includes('.innerHTML=') || c.includes('.innerHTML =')},risk:'HIGH'},{name:'document.write',test:function(c){return c.includes('document.write(')},risk:'HIGH'},{name:'postMessage listener',test:function(c){return c.includes("addEventListener('message") || c.includes('addEventListener("message')},risk:'MED'},{name:'localStorage sensitive',test:function(c){return c.includes('localStorage') && ['token','password','secret','api_key','auth'].some(function(k){return c.toLowerCase().includes(k)})},risk:'HIGH'}];
          for(var i=0;i<scripts.length;i++){var code=scripts[i].textContent||'';if(code.length<10)continue;for(var j=0;j<checks.length;j++){if(checks[j].test(code))r.js_patterns.findings.push({pattern:checks[j].name,risk:checks[j].risk});}}
          if(r.meta_tags['x-frame-options'])r.clickjacking={frameable:false,protection:'X-Frame-Options (meta)'};
          else if(r.meta_tags['has-frame-ancestors'])r.clickjacking={frameable:false,protection:'CSP frame-ancestors'};
          else r.clickjacking={frameable:true,protection:'none'};
          return JSON.stringify(r, null, 2);
        })()
    positionX: 570
    positionY: 150
    orderIndex: 4

  - id: security_scan
    module: browser.evaluate
    label: Security Tests
    params:
      script: |
        (async function() {
          const domain = '[[domain]]';
          const r = {};
          try{const resp=await fetch('https://'+domain,{headers:{'Origin':'https://evil.com'}});r.cors={acao:resp.headers.get('access-control-allow-origin'),acac:resp.headers.get('access-control-allow-credentials')};r.cors.reflects_origin=r.cors.acao==='https://evil.com';r.cors.wildcard=r.cors.acao==='*';r.cors.vulnerable=r.cors.reflects_origin||(r.cors.wildcard&&r.cors.acac==='true');}catch(e){r.cors={error:e.message};}
          try{const resp2=await fetch('https://'+domain,{headers:{'Origin':'null'}});r.cors.null_origin=resp2.headers.get('access-control-allow-origin');r.cors.allows_null=r.cors.null_origin==='null';}catch(e){}
          r.methods={allowed:[],dangerous:[]};
          try{const opt=await fetch('https://'+domain,{method:'OPTIONS'});r.methods.allow_header=opt.headers.get('allow')||opt.headers.get('Access-Control-Allow-Methods')||'';}catch(e){}
          for(var m of['PUT','DELETE','TRACE']){try{const resp=await fetch('https://'+domain,{method:m});if(resp.status<405&&resp.status!==0)r.methods.dangerous.push({method:m,status:resp.status});}catch(e){}}
          try{const resp=await fetch('https://'+domain,{method:'HEAD'});r.server={server:resp.headers.get('server'),x_powered_by:resp.headers.get('x-powered-by'),via:resp.headers.get('via')};}catch(e){r.server={error:e.message};}
          try{const waf=await fetch('https://'+domain+'/?test=<script>alert(1)</script>',{redirect:'manual'});r.waf={status:waf.status,detected:waf.status===403||waf.status===406};}catch(e){r.waf={error:e.message};}
          r.source_maps=[];
          var scripts=[...document.querySelectorAll('script[src]')].slice(0,8);
          for(var s of scripts){try{const resp=await fetch(s.src);const text=await resp.text();const match=text.match(/\/\/[#@]\s*sourceMappingURL=(.+)/);if(match){const mapUrl=new URL(match[1],s.src).href;const mr=await fetch(mapUrl,{method:'HEAD'});r.source_maps.push({script:s.src.split('/').pop(),map:match[1],accessible:mr.ok});}}catch(e){}}
          r.redirect={tested:0,vulnerable:[]};
          for(var p of['?redirect=https://evil.com','?next=https://evil.com','?url=https://evil.com','?return=https://evil.com','?goto=https://evil.com','?callback=https://evil.com','?dest=https://evil.com','?returnTo=https://evil.com']){try{r.redirect.tested++;const resp=await fetch('https://'+domain+'/'+p,{redirect:'manual'});const loc=resp.headers.get('location')||'';if(loc.includes('evil.com'))r.redirect.vulnerable.push({payload:p,location:loc});}catch(e){}}
          r.xss={tested:[],reflected:[],xss_risk:[]};
          var probe='flyto8x2test';
          for(var param of['q','search','query','keyword','name','input','value','text','msg','error','page','id']){try{r.xss.tested.push(param);const resp=await fetch('https://'+domain+'/?'+param+'='+probe);const html=await resp.text();if(html.includes(probe)){r.xss.reflected.push(param);const resp2=await fetch('https://'+domain+'/?'+param+'='+encodeURIComponent('<img src=x onerror='+probe+'>'));const html2=await resp2.text();if(html2.includes('onerror='+probe))r.xss.xss_risk.push(param);}}catch(e){}}
          r.rate_limit={requests:0,blocked_at:null,statuses:[]};
          for(var i=0;i<20;i++){try{const resp=await fetch('https://'+domain+'/?_bust='+i+Date.now(),{cache:'no-store'});r.rate_limit.statuses.push(resp.status);r.rate_limit.requests++;if(resp.status===429||resp.status===503){r.rate_limit.blocked_at=i+1;break;}}catch(e){r.rate_limit.blocked_at=i+1;break;}}
          r.login={found:false};
          for(var path of['/login','/signin','/auth','/admin','/dashboard','/account']){try{const resp=await fetch('https://'+domain+path,{redirect:'follow'});if(resp.ok){const html=await resp.text();if(html.includes('type="password"')||html.includes("type='password'")){r.login={found:true,url:'https://'+domain+path,https:resp.url.startsWith('https'),csrf:html.includes('csrf')||html.includes('_token'),captcha:html.includes('captcha')||html.includes('recaptcha')||html.includes('hcaptcha'),autocomplete_off:html.includes('autocomplete="off"')};break;}}}catch(e){}}
          return JSON.stringify(r, null, 2);
        })()
      _tvars:
        domain: '{{domain}}'
    positionX: 700
    positionY: 150
    orderIndex: 5

  - id: deep_scan
    module: browser.evaluate
    label: Deep Security Tests
    params:
      script: |
        (async function() {
          const domain = '[[domain]]';
          const r = {};
          r.subdomain_takeover={tested:[],risks:[]};
          var indicators=["There isn't a GitHub Pages site here","NoSuchBucket","NoSuchKey","Heroku | No such app","404 Blog is not found","Do you want to register","Fastly error: unknown domain","Repository not found","Project not found"];
          var checkSubs=['api.'+domain,'blog.'+domain,'cloud.'+domain,'docs.'+domain,'dev.'+domain,'staging.'+domain,'admin.'+domain,'mail.'+domain];
          for(var sub of checkSubs.slice(0,8)){if(sub===location.hostname)continue;r.subdomain_takeover.tested.push(sub);try{const resp=await fetch('https://'+sub,{redirect:'follow',signal:AbortSignal.timeout(3000)});const text=await resp.text();for(var ind of indicators){if(text.includes(ind)){r.subdomain_takeover.risks.push({subdomain:sub,indicator:ind});break;}}}catch(e){r.subdomain_takeover.tested[r.subdomain_takeover.tested.length-1]+=' (unreachable)';}}
          r.js_cves={detected:{},vulns:[]};
          var libs={jquery:typeof jQuery!=='undefined'?jQuery.fn.jquery:null,vue:typeof Vue!=='undefined'?(Vue.version||null):null,react:typeof React!=='undefined'?(React.version||null):null,lodash:typeof _!=='undefined'&&_.VERSION?_.VERSION:null,moment:typeof moment!=='undefined'?moment.version:null};
          for(var[name,ver]of Object.entries(libs)){if(!ver)continue;r.js_cves.detected[name]=ver;try{const resp=await fetch('https://api.osv.dev/v1/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({package:{name:name,ecosystem:'npm'},version:ver})});const data=await resp.json();if(data.vulns?.length>0)for(var v of data.vulns.slice(0,3))r.js_cves.vulns.push({lib:name,ver:ver,id:v.id,summary:(v.summary||'').slice(0,150),aliases:(v.aliases||[]).slice(0,2)});}catch(e){}}
          return JSON.stringify(r, null, 2);
        })()
      _tvars:
        domain: '{{domain}}'
    positionX: 770
    positionY: 300
    orderIndex: 5.5
    on_error: continue

  - id: goto_error
    module: browser.goto
    label: Visit 404 Page
    params:
      url: 'https://{{domain}}/flyto-pentest-404-xYz9'
      wait_until: domcontentloaded
      timeout: 10000
    positionX: 830
    positionY: 150
    orderIndex: 6
    on_error: continue

  - id: error_scan
    module: browser.evaluate
    label: Error Page Scan
    params:
      script: |
        (function() {
          var text = (document.body && document.body.innerText) || '';
          var lc = text.toLowerCase();
          var servers = ['nginx','apache','iis','express','django','flask','laravel','tomcat','node.js'];
          var traces = ['stack trace','traceback','exception','syntaxerror','typeerror','referenceerror'];
          var paths = ['/var/','/usr/','/home/','/opt/'];
          return JSON.stringify({
            status: document.title || '',
            has_stack_trace: traces.some(function(t){ return lc.indexOf(t) !== -1; }),
            leaks_server: servers.some(function(s){ return lc.indexOf(s) !== -1; }),
            leaks_path: paths.some(function(p){ return text.indexOf(p) !== -1; }),
            is_custom: text.length > 50,
            page_length: text.length
          }, null, 2);
        })()
    positionX: 960
    positionY: 150
    orderIndex: 7

  - id: reporter
    module: llm.agent
    label: Report Generator
    params:
      prompt_source: manual
      prompt_path: '{{input}}'
      join_strategy: first
      max_input_size: 60000
      agent_type: tools
      system_prompt: |
        You are a professional security report writer. All scan data has been collected by deterministic steps.
        Your ONLY job is to analyze the data and produce the report. Do NOT run any tools.

        LANGUAGE: Write the ENTIRE report in the language specified.
        Supported: en, zh-TW, zh-CN, ja, ko, de, fr, es, pt-BR, it, pl, tr, vi, th, hi, id.
        Technical terms (CSP, HSTS, CVE, TLS, etc.) keep their abbreviation.

        SITE CLASSIFICATION — determine this from the scan data:
        - If no login page found AND no password forms AND hosting on GitHub Pages/Netlify/Vercel → STATIC
        - If login page found OR API endpoints OR database indicators → DYNAMIC
        - If only API responses, no HTML → API
        - If payment forms or Stripe/PayPal detected → E-COMMERCE
        STATIC sites get LOWER severity for: rate limiting, WAF, CORS wildcard, clickjacking, open redirect.

        ACCURACY:
        - Use ONLY the provided scan data. NEVER fabricate or guess.
        - If a field is null/error/missing → write "Not available" with explanation.
        - For security headers: check BOTH api_data.http.headers AND client_data.meta_tags.
          A header is ✅ if found in EITHER source. Show "HTTP" or "Meta" in Source column.
        - HSTS, COOP, CORP can only work via HTTP headers, not meta tags — note this.
        - Include the ACTUAL scan date from api_data.scan_date.
      response_format: text
      output_schema: {}
      context:
        target_domain: '{{domain}}'
        report_language: '{{language}}'
        scan_depth: '{{scan_depth}}'
        api_data: '{{api_scan.result}}'
        client_data: '{{client_scan.result}}'
        security_data: '{{security_scan.result}}'
        deep_scan_data: '{{deep_scan.result}}'
        error_page_data: '{{error_scan.result}}'
      max_iterations: 5
      provider: openai
      model: gpt-4o
      temperature: 0.1
      tools: []
      task: |
        Generate a security audit report for [[domain]] in {{language}}.
        ALL scan data is below. Do NOT run any tools. Just analyze and write the report.

        === API SCAN DATA ===
        {{api_scan.result}}

        === CLIENT-SIDE SCAN DATA ===
        {{client_scan.result}}

        === SECURITY TEST DATA ===
        {{security_scan.result}}

        === DEEP SCAN DATA (Subdomain Takeover + JS CVEs) ===
        {{deep_scan.result}}

        === ERROR PAGE SCAN DATA ===
        {{error_scan.result}}

        ═══════════════════════════════════════════
        REPORT FORMAT — follow this EXACTLY
        ═══════════════════════════════════════════

        ══════════════════════════════════════════════════
        🛡️  Domain Security Audit Report
        ══════════════════════════════════════════════════
        Target: [[domain]]
        Date: [api_data.scan_date]
        Engine: Flyto Security Audit Engine v3.0
        Scan Depth: {{scan_depth}}

        ┌──────────────────────────────────────────┐
        │  Overall Risk: [CRITICAL/HIGH/MEDIUM/LOW]  [X]/100  │
        └──────────────────────────────────────────┘

        Site Classification: [STATIC/DYNAMIC/API/E-COMMERCE]
        [Explain why this classification was chosen and how it affects severity ratings]

        ══════════════════════════════════════════════════
        1. Domain Information
        ══════════════════════════════════════════════════
        IP Address: [api_data.ip]
        Hosting: [api_data.shodan.hostnames]
        Nameservers: [api_data.ns]
        HTTP Status: [api_data.http.status] | Redirect: [api_data.http.redirected]
        Domain Registered: [api_data.whois.registration]
        Domain Expires: [api_data.whois.expiration] ← flag if within 90 days
        DNSSEC: [api_data.dnssec.authenticated — ✅/❌]

        ══════════════════════════════════════════════════
        2. External Attack Surface (Shodan InternetDB)
        ══════════════════════════════════════════════════
        Open Ports: [api_data.shodan.ports with service names]
        Known CVEs: [api_data.shodan.vulns or "None detected"]
        Assessment: [analysis]

        ══════════════════════════════════════════════════
        3. Subdomain Discovery (Certificate Transparency)
        ══════════════════════════════════════════════════
        Total Unique: [api_data.subdomains.unique]
        High-Risk: [api_data.subdomains.notable]
        Full List: [api_data.subdomains.list]
        Assessment: [analysis]

        ══════════════════════════════════════════════════
        4. SSL/TLS Security
        ══════════════════════════════════════════════════
        Note: External SSL Labs scan not included in this automated run.
        HTTPS Active: [Yes if api_data.http.final_url starts with https]
        Assessment: [based on available data]

        ══════════════════════════════════════════════════
        5. Security Headers (HTTP Response + HTML Meta Tags)
        ══════════════════════════════════════════════════
        ⚠️ Platform Limitation: [note if GitHub Pages or similar]

        Cross-reference api_data.http.headers with client_data.meta_tags.
        ✅ if present in EITHER source. ❌ only if absent from ALL sources.

        | Header                       | Status | Source | Risk | Details                |
        |------------------------------|--------|--------|------|------------------------|
        | Content-Security-Policy      | ✅/❌  | HTTP/Meta/None | High | [value summary] |
        | Strict-Transport-Security    | ✅/❌  | HTTP/None | High | Meta tag invalid    |
        | X-Content-Type-Options       | ✅/❌  | HTTP/Meta/None | Med  | [value]         |
        | X-Frame-Options              | ✅/❌  | HTTP/Meta/None | Med  | [or CSP frame-ancestors] |
        | Referrer-Policy              | ✅/❌  | HTTP/Meta/None | Med  | [check meta name=referrer] |
        | Permissions-Policy           | ✅/❌  | HTTP/Meta/None | Med  | [value]         |
        | X-XSS-Protection            | ✅/❌  | HTTP/Meta/None | Low  | Deprecated      |
        | Cross-Origin-Opener-Policy   | ✅/❌  | HTTP/None | Low  | Meta tag invalid    |
        | Cross-Origin-Resource-Policy | ✅/❌  | HTTP/None | Low  | Meta tag invalid    |

        Coverage: [X]/9
        Legend: HTTP = HTTP header (strongest), Meta = <meta> tag (weaker but valid for static hosting)

        ══════════════════════════════════════════════════
        6. Email Security (DNS)
        ══════════════════════════════════════════════════
        MX: [api_data.mx — list records or "Not configured"]
        SPF: [from api_data.txt — find v=spf1 record, or "Not configured"]
        DMARC: [api_data.dmarc or "Not configured"]
        Assessment: [spoofing risk]

        ══════════════════════════════════════════════════
        7. Technology & Platform
        ══════════════════════════════════════════════════
        Hosting: [from shodan hostnames]
        JS Libraries: [client_data.js_libs — list with versions]
        Generator: [client_data.meta_tags.generator]
        Platform Limitations: [what can/cannot be configured]

        ══════════════════════════════════════════════════
        8. Cookie Security
        ══════════════════════════════════════════════════
        JS-Accessible Cookies: [client_data.cookies.count] [names]
        Assessment: [0 = good. If found, note if they should be HttpOnly]

        ══════════════════════════════════════════════════
        9. Third-Party Dependencies
        ══════════════════════════════════════════════════
        External Scripts: [client_data.third_party.unique_domains]
        External Iframes: [client_data.third_party.iframes]
        Assessment: [supply chain risk]

        ══════════════════════════════════════════════════
        10. Mixed Content & Info Disclosure
        ══════════════════════════════════════════════════
