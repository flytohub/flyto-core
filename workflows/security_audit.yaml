      api_key: '{{password_1}}'
      _tvars:
        domain: '{{domain}}'
    positionX: 1090
    positionY: 250
    orderIndex: 8
    resources:
      model: model_node
      memory: memory_node

  - id: save_report
    module: file.write
    label: Save Report
    params:
      path: 'output/security_audit_{{domain}}.txt'
      content: '{{reporter.data.result}}'
    positionX: 1280
    positionY: 150
    orderIndex: 9
    on_error: continue

  - id: display
    module: output.display
    label: Audit Report
    params:
      format: text
      content: '{{reporter.data.result}}'
    positionX: 1280
    positionY: 350
    orderIndex: 10

  - id: model_node
    module: ai.model
    label: GPT-4o
    params:
      model: gpt-4o
      max_tokens: 16384
      api_key: '{{password_1}}'
      temperature: 0.1
      provider: openai
    positionX: 1000
    positionY: 450
    orderIndex: 11

  - id: memory_node
    module: ai.memory
    label: Report Memory
    params:
      window_size: 5
      memory_type: buffer
      initial_messages: []
    positionX: 1180
    positionY: 450
    orderIndex: 12

