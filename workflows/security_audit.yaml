      Where: [DNS provider / server config / HTML source / CI/CD]

      Effort: [Low ~5min / Medium ~30min / High ~hours]


      List actionable fixes first, ordered by severity, then effort (easiest first within same severity).

      Examples of GOOD fixes:

      - SPF: Add DNS TXT record: `v=spf1 -all`

      - DNSSEC: GoDaddy → Domain Settings → DNS Security → Enable

      - security.txt: Create `.well-known/security.txt` with Contact + Expires

      - CSP frame-ancestors: Add frame-ancestors ''self'' to existing CSP meta tag


      ── Platform-Limited (cannot fix on current hosting) ──


