_ui:
  builder:
    sections:
      - id: section_main
        columns: 2
        grid: [6, 6]
        gap: 16px
        columnsData:
          - columnIndex: 0
            components:
              - type: input
                id: domain_input
                label: Target Domain
                module: form.input
                inputType: text
                params: {variable_name: domain}
                default: flyto2.com
                placeholder: 'e.g. company.com'
              - type: select
                id: language_select
                label: Report Language
                module: form.select
                params: {variableName: language}
                options:
                  - {value: en, label: English}
                  - {value: zh-TW, label: 繁體中文}
                  - {value: zh-CN, label: 简体中文}
                  - {value: ja, label: 日本語}
                  - {value: ko, label: 한국어}
                  - {value: de, label: Deutsch}
                  - {value: fr, label: Français}
                  - {value: es, label: Español}
                  - {value: pt-BR, label: 'Português (BR)'}
                  - {value: it, label: Italiano}
                  - {value: pl, label: Polski}
                  - {value: tr, label: Türkçe}
                  - {value: vi, label: Tiếng Việt}
                  - {value: th, label: ไทย}
                  - {value: hi, label: हिन्दी}
                  - {value: id, label: Bahasa Indonesia}
                default: en
          - columnIndex: 1
            components:
              - type: password
                id: api_key_input
                label: OpenAI API Key
                module: form.password
                inputType: password
                params: {variable_name: password_1}
                default: ''
                placeholder: 'sk-...'
              - type: select
                id: depth_select
                label: Scan Depth
                module: form.select
                params: {variableName: scan_depth}
                options:
                  - {value: standard, label: 'Standard (~30s)'}
                  - {value: deep, label: 'Deep Scan (~60s)'}
                default: standard
